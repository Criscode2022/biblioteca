[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# AI API routes (must come before the SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback: serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
